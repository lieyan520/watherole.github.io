<!DOCTYPE html>

<head>

    <nav>

<main>

    <!-- <span class="hero-tag">我的世界模组 · 哈比列车谋杀案</span> -->

    <div id="mTags"></div>
    <h2 id="mTitle"></h2>
    <div class="modal-meta" id="mMeta"></div>
    <div id="mBody"></div>
    <div class="modal-actions" id="modalActions">
      <button class="btn btn-danger" id="modalDeleteBtn">删除此投稿</button>
    </div>
